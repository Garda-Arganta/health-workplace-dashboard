<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Workplace Dashboard</title>
    
    <!-- Tailwind CSS (Untuk Styling Responsif) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Untuk Ikon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (Untuk menerjemahkan JSX di dalam browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animasi Kustom */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* Menyembunyikan scrollbar untuk menu navigasi tab di HP */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-sky-200">
    
    <!-- Area dimana aplikasi React akan dimuat -->
    <div id="root"></div>

    <!-- Logika Aplikasi (React) -->
    <script type="text/babel">
        const { useState } = React;

        // --- MOCK DATA ---
        const mockCompanies = [
            { id: 1, name: "PT Teknologi Nusantara", sector: "Teknologi", score: 92, badge: "Excellent", dimensions: { Fisik: 90, Mental: 85, Finansial: 95, Sosial: 98 }, website: "www.tekno-nusantara.co.id" },
            { id: 2, name: "Bank Sejahtera Berdikari", sector: "Keuangan", score: 88, badge: "Excellent", dimensions: { Fisik: 80, Mental: 90, Finansial: 95, Sosial: 87 }, website: "www.sejahteraberdikari.co.id" },
            { id: 3, name: "CV Manufaktur Maju", sector: "Manufaktur", score: 72, badge: "Good", dimensions: { Fisik: 85, Mental: 55, Finansial: 80, Sosial: 68 }, website: "www.manufaktur-maju.com" },
            { id: 4, name: "PT Ritel Modern", sector: "Perdagangan", score: 65, badge: "Average", dimensions: { Fisik: 60, Mental: 60, Finansial: 70, Sosial: 70 }, website: "www.ritelmodern.co.id" },
            { id: 5, name: "Startup Edukasi Pintar", sector: "Teknologi", score: 85, badge: "Good", dimensions: { Fisik: 75, Mental: 95, Finansial: 80, Sosial: 90 }, website: "www.edukasipintar.id" },
        ];

        const mockAuditQueue = [
            { 
                id: 1, 
                name: "PT Nusantara Digital", 
                status: "Dalam review", 
                sector: "Teknologi",
                employees: "2.400 karyawan",
                claimedScore: 87,
                claims: [
                    { id: 'c1', doc: "Polis asuransi", claim: "Rp 1,5 M", verified: "Rp 1,5 M ✓", statusText: "Sesuai" },
                    { id: 'c2', doc: "Invoice EAP", claim: "Rp 320 jt", verified: "Rp 320 jt ✓", statusText: "Sesuai" },
                    { id: 'c3', doc: "Partisipasi EAP", claim: "78%", verified: "76% (survei)", statusText: "Selisih kecil" },
                    { id: 'c4', doc: "Remote work infra", claim: "Rp 185 jt", verified: "Rp 185 jt ✓", statusText: "Sesuai" },
                    { id: 'c5', doc: "Sertifikat pelatihan", claim: "6 sesi", verified: "6 sesi ✓", statusText: "Sesuai" },
                    { id: 'c6', doc: "Log Absensi (Lembur)", claim: "1.2 Jam/minggu", verified: "1.2 Jam/minggu ✓", statusText: "Sesuai" },
                    { id: 'c7', doc: "Laporan Vendor (eNPS)", claim: "Skor 82", verified: "Skor 82 ✓", statusText: "Sesuai" }
                ],
                logs: [
                    { time: "12 Nov 09:14", text: "Dokumen diterima dari PT Nusantara Digital" },
                    { time: "15 Nov 14:02", text: "Cross-check dimulai — 7 item diverifikasi" },
                    { time: "20 Nov 16:45", text: "Skor draft ditetapkan: 87" }
                ]
            },
            { 
                id: 2, 
                name: "CV Maju Bersama Tbk", 
                status: "Menunggu", 
                sector: "Manufaktur",
                employees: "890 karyawan",
                claimedScore: 74,
                claims: [], logs: []
            }
        ];

        // --- HELPER COMPONENTS ---
        const RadarChart = ({ dimensions }) => {
            const size = 200;
            const center = size / 2;
            const maxRadius = 80;

            const getPoint = (value, index, total) => {
                const angle = (Math.PI / 2) - (index * (2 * Math.PI) / total);
                const radius = (value / 100) * maxRadius;
                return `${center + radius * Math.cos(angle)},${center - radius * Math.sin(angle)}`;
            };

            const keys = Object.keys(dimensions);
            const values = Object.values(dimensions);
            const points = values.map((val, i) => getPoint(val, i, keys.length)).join(' ');
            const maxPoints = keys.map((_, i) => getPoint(100, i, keys.length)).join(' ');
            const midPoints = keys.map((_, i) => getPoint(50, i, keys.length)).join(' ');

            return (
                <div className="flex flex-col items-center">
                <svg width={size} height={size} className="overflow-visible">
                    <polygon points={maxPoints} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                    <polygon points={midPoints} fill="none" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4" />
                    {keys.map((_, i) => (
                    <line key={i} x1={center} y1={center} x2={getPoint(100, i, keys.length).split(',')[0]} y2={getPoint(100, i, keys.length).split(',')[1]} stroke="#e2e8f0" strokeWidth="1" />
                    ))}
                    <polygon points={points} fill="rgba(14, 165, 233, 0.4)" stroke="#0ea5e9" strokeWidth="2" />
                    {values.map((val, i) => {
                    const [cx, cy] = getPoint(val, i, keys.length).split(',');
                    return <circle key={`c-${i}`} cx={cx} cy={cy} r="4" fill="#0369a1" />;
                    })}
                    {keys.map((key, i) => {
                    const [x, y] = getPoint(125, i, keys.length).split(',');
                    return (
                        <text key={`l-${i}`} x={x} y={y} fontSize="12" fill="#475569" textAnchor="middle" dominantBaseline="middle" className="font-semibold">
                        {key} ({values[i]})
                        </text>
                    );
                    })}
                </svg>
                </div>
            );
        };

        // --- VIEWS ---
        const LandingHub = ({ setView }) => (
            <div className="max-w-6xl mx-auto p-4 md:p-6 fade-in slide-up">
                <div className="text-center mb-8 md:mb-12">
                    <h1 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Healthy Workplace Hub</h1>
                    <p className="text-base md:text-lg text-slate-600 max-w-2xl mx-auto px-4">
                        Portal terintegrasi untuk ekosistem kesejahteraan pekerja. Pilih jalur akses Anda.
                    </p>
                </div>

                <div className="grid md:grid-cols-3 gap-6 md:gap-8">
                    {/* Public */}
                    <div onClick={() => setView('public')} className="bg-white rounded-2xl p-6 md:p-8 shadow-lg border border-slate-100 hover:shadow-xl hover:border-sky-300 transition-all cursor-pointer group flex flex-col h-full">
                        <div className="w-14 h-14 md:w-16 md:h-16 bg-sky-100 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-sky-500 transition-colors">
                            <i className="fa-solid fa-users text-2xl md:text-3xl text-sky-600 group-hover:text-white transition-colors"></i>
                        </div>
                        <h2 className="text-xl md:text-2xl font-bold text-slate-900 mb-2">Public Leaderboard</h2>
                        <p className="text-slate-600 mb-6 flex-grow text-sm md:text-base">Akses publik untuk melihat peringkat transparansi dan kesejahteraan perusahaan di tingkat nasional.</p>
                        <div className="flex items-center text-sky-600 font-semibold group-hover:translate-x-2 transition-transform text-sm md:text-base">
                            Lihat Peringkat <i className="fa-solid fa-arrow-right ml-2"></i>
                        </div>
                    </div>

                    {/* Company */}
                    <div onClick={() => setView('company')} className="bg-white rounded-2xl p-6 md:p-8 shadow-lg border border-slate-100 hover:shadow-xl hover:border-slate-800 transition-all cursor-pointer group flex flex-col h-full">
                        <div className="w-14 h-14 md:w-16 md:h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-slate-900 transition-colors">
                            <i className="fa-solid fa-city text-2xl md:text-3xl text-slate-700 group-hover:text-white transition-colors"></i>
                        </div>
                        <h2 className="text-xl md:text-2xl font-bold text-slate-900 mb-2">Company Portal</h2>
                        <p className="text-slate-600 mb-6 flex-grow text-sm md:text-base">Area HR & Finance. Kelola ledger investasi kesejahteraan, unggah bukti, dan pantau insentif pajak.</p>
                        <div className="flex items-center text-slate-900 font-semibold group-hover:translate-x-2 transition-transform text-sm md:text-base">
                            Login Perusahaan <i className="fa-solid fa-arrow-right ml-2"></i>
                        </div>
                    </div>

                    {/* Auditor */}
                    <div onClick={() => setView('auditor')} className="bg-white rounded-2xl p-6 md:p-8 shadow-lg border border-slate-100 hover:shadow-xl hover:border-emerald-400 transition-all cursor-pointer group flex flex-col h-full">
                        <div className="w-14 h-14 md:w-16 md:h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-emerald-500 transition-colors">
                            <i className="fa-solid fa-shield-halved text-2xl md:text-3xl text-emerald-600 group-hover:text-white transition-colors"></i>
                        </div>
                        <h2 className="text-xl md:text-2xl font-bold text-slate-900 mb-2">Auditor Workspace</h2>
                        <p className="text-slate-600 mb-6 flex-grow text-sm md:text-base">Jantung kepercayaan sistem. Area terverifikasi untuk audit bukti klaim dan rilis skor akhir ke DJP.</p>
                        <div className="flex items-center text-emerald-600 font-semibold group-hover:translate-x-2 transition-transform text-sm md:text-base">
                            Akses KAP <i className="fa-solid fa-arrow-right ml-2"></i>
                        </div>
                    </div>
                </div>
            </div>
        );

        const PublicLeaderboard = () => {
            const [filter, setFilter] = useState('Semua Sektor');
            const [selectedCompany, setSelectedCompany] = useState(null);

            const filteredData = filter === 'Semua Sektor' ? mockCompanies : mockCompanies.filter(c => c.sector === filter);

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-6 fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-6 md:mb-8">
                        <div>
                        <h1 className="text-2xl md:text-3xl font-bold text-slate-900 flex items-center gap-3">
                            <i className="fa-solid fa-chart-line text-sky-500"></i> National Leaderboard
                        </h1>
                        <p className="text-sm md:text-base text-slate-600 mt-2">Pilar II - Transparansi Ekosistem Kesejahteraan</p>
                        </div>
                        <div className="flex items-center gap-3 bg-white p-2 rounded-lg border shadow-sm w-full md:w-auto">
                            <i className="fa-solid fa-filter text-slate-400 pl-2"></i>
                            <select className="bg-transparent border-none outline-none font-medium text-slate-700 w-full md:w-auto py-1" value={filter} onChange={(e) => setFilter(e.target.value)}>
                                <option>Semua Sektor</option>
                                <option>Teknologi</option>
                                <option>Keuangan</option>
                                <option>Manufaktur</option>
                                <option>Perdagangan</option>
                            </select>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border overflow-x-auto w-full">
                        <table className="w-full text-left whitespace-nowrap">
                            <thead className="bg-slate-50 border-b">
                                <tr>
                                    <th className="p-4 text-slate-600 font-semibold text-sm md:text-base">Peringkat</th>
                                    <th className="p-4 text-slate-600 font-semibold text-sm md:text-base">Perusahaan</th>
                                    <th className="p-4 text-slate-600 font-semibold text-sm md:text-base">Sektor</th>
                                    <th className="p-4 text-slate-600 font-semibold text-sm md:text-base">Situs</th>
                                    <th className="p-4 text-slate-600 font-semibold text-sm md:text-base">Skor EWI</th>
                                    <th className="p-4 text-slate-600 font-semibold text-sm md:text-base">Status</th>
                                    <th className="p-4 text-slate-600 font-semibold text-center text-sm md:text-base">Transparansi</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredData.map((company, idx) => (
                                <tr key={company.id} className="hover:bg-slate-50 transition-colors">
                                    <td className="p-4 font-bold text-slate-900">#{idx + 1}</td>
                                    <td className="p-4 font-semibold text-slate-800">{company.name}</td>
                                    <td className="p-4 text-slate-600 text-sm">{company.sector}</td>
                                    <td className="p-4">
                                        <a href={`https://${company.website}`} target="_blank" className="text-sky-600 hover:text-sky-800 hover:underline flex items-center gap-1 text-sm">
                                            {company.website} <i className="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                                        </a>
                                    </td>
                                    <td className="p-4 font-bold text-slate-900">{company.score}</td>
                                    <td className="p-4">
                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${company.badge === 'Excellent' ? 'bg-emerald-100 text-emerald-700' : company.badge === 'Good' ? 'bg-sky-100 text-sky-700' : 'bg-amber-100 text-amber-700'}`}>
                                            {company.badge === 'Excellent' ? '🟢' : company.badge === 'Good' ? '🔵' : '🟡'} {company.badge}
                                        </span>
                                    </td>
                                    <td className="p-4 text-center">
                                        <button onClick={() => setSelectedCompany(company)} className="text-sky-600 hover:text-sky-800 font-medium text-sm border border-sky-200 px-3 py-1.5 rounded-lg hover:bg-sky-50 transition-colors">
                                            Deep-Dive
                                        </button>
                                    </td>
                                </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {selectedCompany && (
                        <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-6 md:p-8 max-w-md w-full shadow-2xl relative fade-in overflow-y-auto max-h-[90vh]">
                                <button onClick={() => setSelectedCompany(null)} className="absolute top-4 right-5 text-slate-400 hover:text-slate-700 text-xl">✕</button>

                                <p className="text-center text-slate-500 mb-8 text-sm">{selectedCompany.sector} • Skor: {selectedCompany.score}</p>
                                
                                <div className="mb-8 flex justify-center">

                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-sm text-slate-600">

                                    {selectedCompany.dimensions.Mental < 70 ? (

        const CompanyPortal = () => {

            const [activeTab, setActiveTab] = useState('ledger');
            const [ledgerTab, setLedgerTab] = useState('history');
            const [uploadedFiles, setUploadedFiles] = useState([]);

            if (!isLogged) {
                return (
                    <div className="max-w-md mx-auto mt-10 md:mt-20 p-6 md:p-8 bg-white rounded-3xl shadow-xl border border-slate-100 fade-in mx-4 md:mx-auto">

                            <div className="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-5">
                                <i className="fa-solid fa-city text-white text-3xl"></i>
                            </div>
                            <h2 className="text-2xl font-bold text-slate-900">Portal Perusahaan</h2>
                            <p className="text-slate-500 mt-2 text-sm">Login menggunakan NPWP Badan Anda</p>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">NPWP Badan</label>
                                <input type="text" placeholder="00.000.000.0-000.000" className="w-full p-3.5 border rounded-xl focus:ring-2 focus:ring-slate-900 outline-none bg-slate-50" />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Password Sistem</label>
                                <input type="password" placeholder="••••••••" className="w-full p-3.5 border rounded-xl focus:ring-2 focus:ring-slate-900 outline-none bg-slate-50" />
                            </div>
                            <button onClick={() => setIsLogged(true)} className="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-slate-800 transition-colors mt-2 shadow-lg shadow-slate-200">
                                Masuk ke Dashboard
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-6 fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 md:mb-8 bg-slate-900 text-white p-5 md:p-6 rounded-2xl shadow-lg">
                        <div>
                            <h1 className="text-xl md:text-2xl font-bold flex items-center gap-3">
                                <i className="fa-solid fa-city text-sky-400"></i> PT Teknologi Nusantara Dashboard
                            </h1>
                            <p className="text-slate-300 mt-1.5 text-sm font-medium">NPWP: 12.345.678.9-012.000</p>
                        </div>
                        <button onClick={() => setIsLogged(false)} className="w-full md:w-auto justify-center flex items-center gap-2 text-slate-300 hover:text-white bg-slate-800 px-5 py-2.5 rounded-xl transition-colors font-semibold text-sm">
                            <i className="fa-solid fa-arrow-right-from-bracket"></i> Keluar
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8">
                        {/* Sidebar Tabs */}
                        <div className="col-span-1 md:col-span-3 flex flex-row md:flex-col gap-2 overflow-x-auto pb-2 md:pb-0 no-scrollbar">
                            <button onClick={() => setActiveTab('ledger')} className={`whitespace-nowrap flex-1 md:w-full flex items-center justify-center md:justify-start gap-3 p-3.5 md:p-4 rounded-xl font-bold transition-all ${activeTab === 'ledger' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 bg-white md:bg-transparent border md:border-none'}`}>
                                <i className="fa-solid fa-file-lines"></i> Ledger
                            </button>
                            <button onClick={() => setActiveTab('vault')} className={`whitespace-nowrap flex-1 md:w-full flex items-center justify-center md:justify-start gap-3 p-3.5 md:p-4 rounded-xl font-bold transition-all ${activeTab === 'vault' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 bg-white md:bg-transparent border md:border-none'}`}>
                                <i className="fa-solid fa-database"></i> Vault
                            </button>
                            <button onClick={() => setActiveTab('metrics')} className={`whitespace-nowrap flex-1 md:w-full flex items-center justify-center md:justify-start gap-3 p-3.5 md:p-4 rounded-xl font-bold transition-all ${activeTab === 'metrics' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 bg-white md:bg-transparent border md:border-none'}`}>
                                <i className="fa-solid fa-chart-pie"></i> Metrik Data
                            </button>
                            <button onClick={() => setActiveTab('simulation')} className={`whitespace-nowrap flex-1 md:w-full flex items-center justify-center md:justify-start gap-3 p-3.5 md:p-4 rounded-xl font-bold transition-all ${activeTab === 'simulation' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 bg-white md:bg-transparent border md:border-none'}`}>
                                <i className="fa-solid fa-chart-line"></i> Simulasi
                            </button>
                            <button onClick={() => setActiveTab('klaim')} className={`whitespace-nowrap flex-1 md:w-full flex items-center justify-center md:justify-start gap-3 p-3.5 md:p-4 rounded-xl font-bold transition-all ${activeTab === 'klaim' ? 'bg-sky-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 bg-white md:bg-transparent border md:border-none'}`}>
                                <i className="fa-solid fa-arrow-up-right-from-square"></i> Klaim
                            </button>
                        </div>

                        {/* Content Area */}
                        <div className="col-span-1 md:col-span-9 bg-white rounded-2xl shadow-sm border border-slate-100 p-4 md:p-6 min-h-[500px]">
                            
                            {activeTab === 'ledger' && (
                                <div className="fade-in">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b pb-4">
                                        <h2 className="text-xl md:text-2xl font-bold text-slate-900">Spending Ledger</h2>
                                        <div className="flex bg-slate-100 p-1.5 rounded-xl w-full sm:w-auto">
                                            <button onClick={() => setLedgerTab('history')} className={`flex-1 sm:flex-none px-4 py-2 text-sm font-bold rounded-lg transition-all ${ledgerTab === 'history' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500 hover:text-slate-700'}`}>Riwayat Input</button>
                                            <button onClick={() => setLedgerTab('qwi')} className={`flex-1 sm:flex-none px-4 py-2 text-sm font-bold rounded-lg transition-all ${ledgerTab === 'qwi' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500 hover:text-slate-700'}`}>Akumulasi QWI</button>
                                        </div>
                                    </div>

                                    {ledgerTab === 'history' && (
                                        <div className="fade-in">
                                            <h3 className="font-bold text-slate-800 mb-4 text-lg">Riwayat Terakhir</h3>
                                            <div className="overflow-x-auto w-full border rounded-xl shadow-sm">
                                                <table className="w-full text-sm text-left whitespace-nowrap md:whitespace-normal">
                                                    <thead className="bg-slate-50 text-slate-700 border-b">
                                                        <tr>
                                                            <th className="p-4 font-semibold">Tanggal</th>

                            <i className="fa-solid fa-circle-check text-emerald-400 text-2xl shrink-0 mt-0.5"></i>
                            <div>
                                <h4 className="font-bold text-lg mb-1">Audit Final Tersubmit!</h4>
                                <p className="text-sm text-slate-300 font-medium">Data telah dikirim ke:</p>
                                <ul className="text-xs mt-2 space-y-1 text-emerald-300 font-semibold">
                                    <li>• Leaderboard Publik Nasional</li>
                                    <li>• Sistem Database DJP (Kemenkeu)</li>
                                </ul>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 md:mb-8 border-b pb-5">
                        <div>
                            <h1 className="text-xl md:text-2xl font-bold text-slate-900 flex items-center gap-3">
                                <i className="fa-solid fa-shield-halved text-emerald-500"></i> Workspace Auditor
                            </h1>
                            <p className="text-slate-500 text-sm mt-1.5 font-medium">Status: Terhubung ke Registry Nasional & DJP</p>
                        </div>
                        <button onClick={() => setIs2FA(false)} className="w-full sm:w-auto justify-center text-slate-500 hover:text-slate-800 text-sm font-bold flex items-center gap-2 bg-slate-100 sm:bg-transparent p-2.5 sm:p-0 rounded-xl">
                            <i className="fa-solid fa-arrow-right-from-bracket"></i> Keluar
                        </button>
                    </div>

                    {!selectedAudit ? (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto w-full fade-in">
                            <div className="p-5 bg-slate-50 border-b flex justify-between items-center min-w-[600px]">
                                <h2 className="font-bold text-slate-800 text-lg">Antrian Verifikasi</h2>
                                <div className="bg-white px-4 py-1.5 rounded-full border text-xs font-bold text-slate-700 shadow-sm flex items-center gap-2">
                                    <div className="w-2.5 h-2.5 bg-amber-500 rounded-full animate-pulse"></div> 2 Menunggu
                                </div>
                            </div>
                            <div className="divide-y divide-slate-100 min-w-[600px]">
                                {mockAuditQueue.map(item => (
                                <div key={item.id} className="p-5 hover:bg-slate-50 flex justify-between items-center cursor-pointer transition-colors" onClick={() => setSelectedAudit(item)}>
                                    <div>
                                        <div className="flex items-center gap-3 mb-1.5">
                                            <h3 className="font-black text-slate-900 text-lg">{item.name}</h3>
                                            <span className={`text-xs px-2.5 py-1 rounded-md font-bold ${item.status === 'Dalam review' ? 'bg-sky-100 text-sky-700' : 'bg-slate-100 text-slate-600'}`}>{item.status}</span>
                                        </div>
                                        <p className="text-sm text-slate-500 font-medium">{item.sector} • {item.employees} • Skor draft: <span className="font-bold text-slate-700">{item.claimedScore}</span></p>
                                    </div>
                                    <button className="text-emerald-700 hover:text-white font-bold text-sm flex items-center gap-2 bg-emerald-50 hover:bg-emerald-600 px-4 py-2.5 rounded-xl border border-emerald-100 transition-colors">
                                        Buka Review <i className="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="fade-in slide-up">
                            <button onClick={() => setSelectedAudit(null)} className="text-slate-500 mb-6 hover:text-slate-800 font-bold text-sm flex items-center gap-2 bg-white px-4 py-2 border rounded-xl shadow-sm w-fit">
                                <i className="fa-solid fa-arrow-left"></i> Kembali ke Antrean
                            </button>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6">
                                    <div className="mb-6 border-b pb-5">
                                        <h3 className="text-xl font-bold text-slate-900 flex items-center gap-3 mb-1">
                                            <i className="fa-solid fa-magnifying-glass text-sky-500"></i> Cross-Check — {selectedAudit.name}
                                        </h3>
                                        <p className="text-sm text-slate-500 font-medium">{selectedAudit.sector} • {selectedAudit.employees}</p>
                                    </div>
                                    
                                    <div className="overflow-x-auto mb-8 border rounded-xl shadow-sm">
                                        <table className="w-full text-left text-sm border-collapse whitespace-nowrap md:whitespace-normal">
                                            <thead className="bg-slate-50 text-slate-700">
                                                <tr>
                                                    <th className="p-4 font-bold border-b border-slate-200">Dokumen / Item</th>
                                                    <th className="p-4 font-bold border-b border-slate-200">Klaim Perusahaan</th>
                                                    <th className="p-4 font-bold border-b border-slate-200">Hasil Verifikasi</th>
                                                    <th className="p-4 font-bold border-b border-slate-200">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {selectedAudit.claims?.map((claim) => (
                                                <tr key={claim.id} className="hover:bg-slate-50">
                                                    <td className="p-4 font-bold text-slate-800">{claim.doc}</td>
                                                    <td className="p-4 text-slate-600 font-medium">{claim.claim}</td>
                                                    <td className="p-4 text-emerald-600 font-bold">{claim.verified}</td>
                                                    <td className="p-4">
                                                    <span className={`px-2.5 py-1 rounded-md text-xs font-bold ${claim.statusText === 'Sesuai' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}`}>
                                                        {claim.statusText}
                                                    </span>
                                                    </td>
                                                </tr>
                                                ))}
                                                {(!selectedAudit.claims || selectedAudit.claims.length === 0) && <tr><td colSpan="4" className="p-6 text-center text-slate-400 font-medium">Belum ada data klaim untuk direview.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="flex justify-between items-center bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                        <span className="font-bold text-slate-800 text-lg">Skor final auditor</span>
                                        <span className="text-5xl font-black text-emerald-500">{selectedAudit.claimedScore}</span>
                                    </div>
                                </div>

                                <div className="space-y-6 md:space-y-8">
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6">
                                        <div className="flex justify-between items-center mb-6 border-b pb-5">
                                            <h3 className="text-lg font-bold text-slate-900">Audit Trail — Log Permanen</h3>
                                            <span className="bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 border border-rose-100">
                                                <i className="fa-solid fa-lock text-[10px]"></i> Tidak dapat diubah
                                            </span>
                                        </div>
                                        <div className="space-y-1">
                                            {selectedAudit.logs?.map((log, i) => (
                                            <div key={i} className="flex gap-4 items-start p-3 hover:bg-slate-50 rounded-xl transition-colors">
                                                <div className="w-24 shrink-0 text-xs font-mono text-slate-400 font-bold mt-1">{log.time}</div>
                                                <div className="text-sm text-slate-700 font-medium">{log.text}</div>
                                            </div>
                                            ))}
                                            {(!selectedAudit.logs || selectedAudit.logs.length === 0) && <p className="text-slate-400 text-center py-4 text-sm font-medium">Tidak ada log aktivitas.</p>}
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 rounded-2xl shadow-xl p-6 md:p-8 text-white relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 opacity-[0.03] pointer-events-none">
                                            <i className="fa-solid fa-shield-halved text-[200px]"></i>
                                        </div>
                                        <div className="relative z-10">
                                            <h3 className="text-2xl font-black mb-6 text-emerald-400">Submit Skor Final</h3>
                                            <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 mb-8 flex gap-4 items-start">
                                                <i className="fa-solid fa-circle-exclamation text-sky-400 text-xl mt-0.5 shrink-0"></i>
                                                <p className="text-slate-300 leading-relaxed text-sm md:text-base font-medium">
                                                    Skor final akan dikirim secara otomatis ke:<br/>
                                                    <strong className="text-white">Leaderboard Nasional</strong> (publikasi) & <strong className="text-white">Sistem DJP</strong> (validasi hak deduction).
                                                </p>
                                            </div>
                                            <button onClick={handleSubmit} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 md:py-5 rounded-2xl shadow-lg shadow-emerald-900/50 transition-all active:scale-[0.98] flex justify-center items-center gap-3 text-lg">
                                                <i className="fa-solid fa-database"></i> Submit & Kirim Data
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- APP CONTAINER ---
        const App = () => {
            const [currentView, setCurrentView] = useState('landing');

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 flex flex-col">
                    <header className="bg-white border-b sticky top-0 z-40 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer group shrink-0" onClick={() => setCurrentView('landing')}>
                                <div className="bg-sky-500 w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center group-hover:bg-sky-600 transition-colors shadow-md">
                                    <i className="fa-solid fa-chart-line text-white md:text-lg"></i>
                                </div>
                                <span className="font-black text-xl md:text-2xl tracking-tight text-slate-800 group-hover:text-sky-600 transition-colors hidden sm:block">
                                    HealthyWork<span className="text-sky-500">.</span>
                                </span>
                            </div>
                            {currentView !== 'landing' && (
                                <button onClick={() => setCurrentView('landing')} className="text-xs md:text-sm font-bold text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 px-4 md:px-5 py-2 md:py-2.5 rounded-full transition-colors flex items-center gap-2">
                                    <i className="fa-solid fa-arrow-left"></i> Kembali <span className="hidden sm:inline">ke Hub</span>
                                </button>
                            )}
                        </div>
                    </header>
                    <main className="flex-grow pt-4 md:pt-8 pb-20">
                        {currentView === 'landing' && <LandingHub setView={setCurrentView} />}
                        {currentView === 'public' && <PublicLeaderboard />}
                        {currentView === 'company' && <CompanyPortal />}
                        {currentView === 'auditor' && <AuditorWorkspace />}
                    </main>
                </div>
            );
        };

        // --- RENDER KE DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
